<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClothCraft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>ClothCraft</h1>

        <div class="catandmenu">
        <ul>
            <li><a href="#.html">MEN</a></li>
            <li><a href="#.html">WOMEN</a></li>
            <li><a href="#.html">KIDS</a></li>
            <li><a href="#.html">BABIES</a></li>
        </ul>

        <button id="menubutton" onclick="showsidenav()">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </button>
        </div>
    </header>

    <section class="designs-section">

    <div class="top-bar">
        <button class="try-btn">Try our designs</button>
    </div>

    <div class="bottom-dark">
    <div class="center-btn">
    </div>

    <div class="carousel-wrapper">

    <div class="carousel-container">
        <div class="carousel" id="carousel">
            <img src="Asstes/1.png">
            <img src="Asstes/2.png">
            <img src="Asstes/3.png">
            <img src="Asstes/4.png">
            <img src="assets/sample5.jpg">
            <img src="assets/sample1.jpg">
            <img src="assets/sample2.jpg">
            <img src="assets/sample3.jpg">
        </div>
    </div>

     <div class="arrow">
        <button class="arrow-btn">&#10094;</button>
        <button class="arrow-btn">&#10095;</button>
    </div>

</div>

    <!-- CTA BUTTON -->
    <div class="center-btn">
        <a href="#.html"><button>Create My Own</button></a>
    </div>

    <!-- BOTTOM GRID CAROUSEL -->
<div class="grid-wrapper">

    <div class="grid-container">
        <div class="grid-carousel" id="gridCarousel">
            <img src="Asstes/Cropped Plain Tee.png">
            <img src="Asstes/Hoodie.png">
            <img src="Asstes/Long sleeves.png">
            <img src="Asstes/Polo Shirt.png">
            <img src="Asstes//T-shirt.png">
            <img src="Asstes/Tank Top.png">
        </div>
    </div>

    <div class="grid-arrow">
    <button class="grid-btn">&#10094;</button>
    <button class="grid-btn">&#10095;</button>
</div>

</div>

</section>

    <script src="script.js"></script>
